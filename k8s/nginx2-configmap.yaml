apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx2-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Fecha y hora</title>
      <style>
        body {
          margin: 0;
          height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background-color: blue;
          color: white;
          font-family: Arial, sans-serif;
        }

        #clock {
          font-size: 3rem;
          margin-bottom: 20px;
          text-align: center;
        }

        img {
          max-width: 300px;
          height: auto;
        }
      </style>
    </head>
    <body>
      <div id="clock"></div>

      <img src="https://embamex.sre.gob.mx/republicadominicana/images/stories/mapa%20rep%20dom%202.jpg" alt="Futbolred">

      <script>
        function updateClock() {
          const now = new Date();
          document.getElementById("clock").innerHTML = now.toLocaleString();
        }

        setInterval(updateClock, 1000);
        updateClock();
      </script>
    </body>
    </html>